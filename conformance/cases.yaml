suite_version: "2.1.0"
protocol_version: "0.1"

cases:
  - id: validate-comprehensive-application
    description: A comprehensive application fixture with contracts and a namespaced extension is valid.
    operation: validate
    package: fixtures/comprehensive-application
    expect:
      result: pass

  - id: validate-portable-feature
    description: A feature with tested-against capability revisions is valid.
    operation: validate
    package: fixtures/portable-feature
    expect:
      result: pass

  - id: validate-revision-feature
    description: A feature can carry tested-against evidence and integration guidance.
    operation: validate
    package: fixtures/revision-feature
    expect:
      result: pass

  - id: verify-capability-conformance-result
    description: A capability result binds the exact contract and suite bytes, covers every declared check, and derives a passing status independently from project completion.
    operation: capability-conformance
    package: fixtures/comprehensive-application
    capability: org.seedspec.core.chores
    result_file: fixtures/capability-conformance-pass.yaml
    expect:
      result: pass
      capability_status: passed

  - id: reject-stale-capability-conformance-result
    description: A result bound to different suite bytes cannot establish capability conformance.
    operation: capability-conformance
    package: fixtures/comprehensive-application
    capability: org.seedspec.core.chores
    result_file: fixtures/capability-conformance-stale.yaml
    expect:
      result: fail
      code: STALE_CAPABILITY_CONFORMANCE_RESULT

  - id: reject-capability-change-tag-version-mismatch
    description: Breaking, additive, and clarifying change tags must agree with the declared capability version transition.
    operation: validate
    package: fixtures/invalid-capability-history
    expect:
      result: fail
      code: INVALID_MANIFEST_SEMANTICS

  - id: reject-invalid-task-runbook-reference
    description: Package-authored task references must identify regular files inside the package.
    operation: validate
    package: fixtures/invalid-task-runbook
    expect:
      result: fail
      code: INVALID_TASK_RUNBOOK

  - id: validate-profiled-workflow
    description: A workflow kind hint can package configured external state and cross-system automation without requiring a standalone codebase.
    operation: validate
    package: fixtures/profiled-workflow
    expect:
      result: pass

  - id: validate-core-and-namespaced-verification-methods
    description: Profile conditions accept every core verification method and preserve a namespaced experimental method.
    operation: validate
    package: fixtures/verification-methods
    expect:
      result: pass

  - id: reject-unnamespaced-verification-method
    description: Experimental verification methods must be namespaced rather than resembling unregistered core enum values.
    operation: validate
    package: fixtures/invalid-verification-method
    expect:
      result: fail
      code: INVALID_MANIFEST

  - id: validate-implementation-resource-declarations
    description: Authors can bundle a digest-verified package-scoped SKILL.md, select versioned implementation resources, and delegate additional discovery without asserting implementation capability or native skill installation.
    operation: validate
    package: fixtures/implementation-resources
    expect:
      result: pass

  - id: reject-insecure-implementation-resource-url
    description: Canonical implementation resources must use HTTPS.
    operation: validate
    package: fixtures/insecure-implementation-resource
    expect:
      result: fail
      code: INVALID_IMPLEMENTATION_RESOURCE

  - id: reject-unsupported-protocol
    operation: validate
    package: fixtures/unsupported-protocol
    expect:
      result: fail
      code: UNSUPPORTED_PROTOCOL_VERSION

  - id: reject-unknown-core-field
    operation: validate
    package: fixtures/invalid-unknown-field
    expect:
      result: fail
      code: INVALID_MANIFEST

  - id: reject-unnamespaced-package-id
    operation: validate
    package: fixtures/invalid-id
    expect:
      result: fail
      code: INVALID_MANIFEST

  - id: reject-nonportable-path
    operation: validate
    package: fixtures/invalid-path
    expect:
      result: fail
      code: INVALID_MANIFEST

  - id: reject-unsafe-unreferenced-content
    description: Every package entry is checked even when the manifest does not reference it.
    operation: validate
    package: fixtures/unsafe-content
    expect:
      result: fail
      code: UNSAFE_PACKAGE_CONTENT

  - id: reject-duplicate-capability
    operation: validate
    package: fixtures/duplicate-capability
    expect:
      result: fail
      code: INVALID_MANIFEST_SEMANTICS

  - id: reject-invalid-tested-against
    operation: validate
    package: fixtures/invalid-tested-against
    expect:
      result: fail
      code: INVALID_MANIFEST

  - id: reject-missing-capability-contract
    operation: validate
    package: fixtures/missing-contract
    expect:
      result: fail
      code: INVALID_REFERENCES

  - id: reject-unknown-artifact-relationship-target
    description: Artifact relationships can only connect artifact IDs declared in the same package.
    operation: validate
    package: fixtures/invalid-artifact-relationship
    expect:
      result: fail
      code: INVALID_MANIFEST_SEMANTICS

  - id: reject-invalid-primary-intent-artifact
    description: A primary intent artifact must match the definition entrypoint and declare the intent concern.
    operation: validate
    package: fixtures/invalid-primary-intent
    expect:
      result: fail
      code: INVALID_MANIFEST_SEMANTICS

  - id: package-digest-is-stable
    operation: digest-stability
    package: fixtures/comprehensive-application
    expect:
      result: pass
      digest: sha256:9823e5f458876963b118263ac55871bb43680ca93da8a3a75d047ef1f8f4af90

  - id: resolve-application-with-portable-feature
    description: The comprehensive application and portable feature fixtures produce a ready project.
    operation: resolve
    root: fixtures/comprehensive-application
    additions:
      - fixtures/portable-feature
    configuration_selection: examples
    intent_selection: affirmed
    expect:
      result: pass
      project_status: ready
      intent_status: affirmed
      completion_scope_status: review
      addition_order:
        - org.seedspec.fixtures.portable-feature

  - id: resolve-configured-system-and-automation-root
    description: A provider-specific non-code-first root resolves through the same configuration, decision, handoff, and verification model.
    operation: resolve
    root: fixtures/profiled-workflow
    additions: []
    implementations:
      - hubspot-native
    configuration_selection: examples
    intent_selection: affirmed
    expect:
      result: pass
      project_status: ready
      configuration_status: selected
      intent_status: affirmed
      implementation_profile_status: recorded
      completion_scope_status: review
      addition_order: []
      review_count: 0

  - id: review-ambiguous-implementation-profiles
    description: Multiple candidate profiles without a recorded preference require the agent to ask which direction to prefer.
    operation: resolve
    root: fixtures/profiled-workflow
    additions: []
    configuration_selection: examples
    intent_selection: affirmed
    expect:
      result: pass
      project_status: needs-input
      configuration_status: selected
      intent_status: affirmed
      implementation_profile_status: review
      completion_scope_status: review
      addition_order: []

  - id: resolve-order-independent-feature-graph
    description: Feature order is deterministic by package ID and does not claim implementation order.
    operation: resolve
    root: fixtures/comprehensive-application
    additions:
      - fixtures/chain-consumer
      - fixtures/chain-provider
    configuration_selection: examples
    intent_selection: affirmed
    expect:
      result: pass
      project_status: ready
      intent_status: affirmed
      addition_order:
        - org.example.chain-consumer
        - org.example.chain-provider
      preserved_extension:
        package: org.example.chain-provider
        key: org.example.conformance-marker

  - id: review-missing-provider
    operation: resolve
    root: fixtures/comprehensive-application
    additions:
      - fixtures/unmet-capability-feature
    configuration_selection: examples
    intent_selection: affirmed
    expect:
      result: pass
      project_status: ready
      intent_status: affirmed
      addition_order:
        - org.example.teleportation
      review_count: 1

  - id: flag-capability-revision-review
    operation: resolve
    root: fixtures/comprehensive-application
    additions:
      - fixtures/revision-review
    configuration_selection: examples
    intent_selection: affirmed
    expect:
      result: pass
      project_status: ready
      intent_status: affirmed
      addition_order:
        - org.example.revision-review
      review_count: 1

  - id: review-multiple-declared-providers
    operation: resolve
    root: fixtures/comprehensive-application
    additions:
      - fixtures/ambiguous-provider
    configuration_selection: examples
    intent_selection: affirmed
    expect:
      result: pass
      project_status: ready
      intent_status: affirmed
      addition_order:
        - org.example.ambiguous-provider
      review_count: 1

  - id: reject-duplicate-package-selection
    operation: resolve
    root: fixtures/comprehensive-application
    additions:
      - fixtures/chain-provider
      - fixtures/chain-provider
    expect:
      result: fail
      code: DUPLICATE_ADDITION

  - id: review-declared-conflict
    operation: resolve
    root: fixtures/comprehensive-application
    additions:
      - fixtures/conflicting-feature
    configuration_selection: examples
    intent_selection: affirmed
    expect:
      result: pass
      project_status: ready
      intent_status: affirmed
      addition_order:
        - org.example.conflicting-feature
      review_count: 1

  - id: review-declared-requirement-cycle
    operation: resolve
    root: fixtures/comprehensive-application
    additions:
      - fixtures/cycle-a
      - fixtures/cycle-b
    configuration_selection: examples
    intent_selection: affirmed
    expect:
      result: pass
      project_status: ready
      intent_status: affirmed
      addition_order:
        - org.example.cycle-a
        - org.example.cycle-b
      review_count: 1

  - id: preserve-required-decision
    operation: resolve
    root: fixtures/comprehensive-application
    additions:
      - fixtures/decision-feature
    configuration_selection: examples
    intent_selection: affirmed
    expect:
      result: pass
      project_status: needs-input
      configuration_status: selected
      intent_status: affirmed
      addition_order:
        - org.example.decision-feature

  - id: accept-decision-answer
    operation: resolve
    root: fixtures/comprehensive-application
    additions:
      - fixtures/decision-feature
    decisions: fixtures/decision-answers.yaml
    configuration_selection: examples
    intent_selection: affirmed
    expect:
      result: pass
      project_status: ready
      intent_status: affirmed
      addition_order:
        - org.example.decision-feature

  - id: reject-invalid-decision-answer
    operation: resolve
    root: fixtures/comprehensive-application
    additions:
      - fixtures/decision-feature
    decisions: fixtures/invalid-decision-answers.yaml
    configuration_selection: examples
    intent_selection: affirmed
    expect:
      result: fail
      code: INVALID_DECISIONS

  - id: preserve-unselected-configuration-as-review
    description: Omitting configuration choices produces an inspectable handoff that is not ready.
    operation: resolve
    root: fixtures/comprehensive-application
    additions: []
    configuration_selection: omitted
    intent_selection: affirmed
    expect:
      result: pass
      project_status: needs-input
      configuration_status: review
      intent_status: affirmed
      addition_order: []

  - id: preserve-unaffirmed-intent-as-review
    description: Omitting applied intent preserves package-authored sources but requires end-user review before implementation.
    operation: resolve
    root: fixtures/comprehensive-application
    additions: []
    configuration_selection: examples
    intent_selection: omitted
    expect:
      result: pass
      project_status: needs-input
      configuration_status: selected
      intent_status: review

  - id: resolve-rich-applied-intent
    description: Applied intent preserves package adaptation, end-user outcomes, verification plans, and evidenced baseline observations.
    operation: resolve
    root: fixtures/comprehensive-application
    additions: []
    configuration_selection: examples
    applied_intent: fixtures/applied-intent-rich.yaml
    expect:
      result: pass
      project_status: ready
      configuration_status: selected
      intent_status: affirmed
      addition_order: []

  - id: reject-unexplained-intent-adaptation
    description: Adapted or partial package use must explain how the reusable intent changes for this realization.
    operation: resolve
    root: fixtures/comprehensive-application
    additions: []
    configuration_selection: examples
    applied_intent: fixtures/applied-intent-invalid-adaptation.yaml
    expect:
      result: fail
      code: INVALID_APPLIED_INTENT

  - id: reject-unevidenced-baseline-observation
    description: A baseline fact cannot be recorded as observed without evidence references to the inspected state.
    operation: resolve
    root: fixtures/comprehensive-application
    additions: []
    configuration_selection: examples
    applied_intent: fixtures/applied-intent-invalid-baseline.yaml
    expect:
      result: fail
      code: INVALID_APPLIED_INTENT
      addition_order: []
