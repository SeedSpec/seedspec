protocol_version: "0.2"
id: org.seedspec.fixtures.revision-feature
name: Revision Feature Fixture
version: "0.1.0"
kind: feature
description: Exercise feature requirements whose tested revisions differ from a selected provider.

metadata:
  license: Apache-2.0

definition:
  entrypoint: definition/feature.md

configuration:
  schema: configuration/schema.json
  example: configuration/example.yaml

requires:
  capabilities:
    - id: org.seedspec.core.actors
      tested_against: "1.0.0"
    - id: org.seedspec.core.chores
      tested_against: "1.0.0"
    - id: org.seedspec.core.assignments
      tested_against: "1.0.0"
    - id: org.seedspec.core.approvals
      tested_against: "1.0.0"

provides:
  capabilities:
    - id: org.seedspec.engagement.chore-streaks
      version: "1.0.0"
      contract: capabilities/chore-streaks.md

compatibility:
  scope: domain
  domain: org.seedspec.domain.household-work

components:
  integration: integration/
  acceptance: acceptance/
