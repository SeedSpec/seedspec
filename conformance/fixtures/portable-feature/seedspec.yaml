protocol_version: "0.2"
id: org.seedspec.fixtures.portable-feature
name: Portable Feature Fixture
version: "0.1.0"
kind: feature
description: Exercise a portable feature with required and provided capability contracts.

metadata:
  license: Apache-2.0

definition:
  entrypoint: definition/feature.md

configuration:
  schema: configuration/schema.json
  example: configuration/example.yaml

requires:
  capabilities:
    - id: org.seedspec.core.actors
      tested_against: "1.0.0"
    - id: org.seedspec.core.balances
      tested_against: "1.0.0"
    - id: org.seedspec.core.transactions
      tested_against: "1.0.0"

provides:
  capabilities:
    - id: org.seedspec.finance.savings-goals
      version: "1.0.0"
      contract: capabilities/savings-goals.md
    - id: org.seedspec.finance.goal-allocations
      version: "1.0.0"
      contract: capabilities/goal-allocations.md
    - id: org.seedspec.finance.goal-progress
      version: "1.0.0"
      contract: capabilities/goal-progress.md

compatibility:
  scope: generic

components:
  integration: integration/
  acceptance: acceptance/
