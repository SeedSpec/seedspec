name: Stage coordinated npm release

run-name: Stage npm packages by @${{ github.actor }}

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-stage
  cancel-in-progress: false

jobs:
  stage:
    name: Test and stage selected packages
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Require main
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "npm packages may only be staged from main; received $GITHUB_REF" >&2
            exit 1
          fi

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install staged-publishing npm version
        run: npm install --global npm@11.18.0

      - name: Install dependencies
        run: npm ci

      - name: Verify generated release artifacts are committed
        run: |
          npm run release:protocol
          git diff --exit-code

      - name: Check packages
        run: npm run check

      - name: Check protocol conformance
        run: npm run conformance

      - name: Inspect package archives
        run: npm run release:pack

      - name: Stage @seedspec/protocol
        working-directory: packages/protocol
        run: npm stage publish --tag latest

      - name: Stage @seedspec/runtime
        working-directory: packages/runtime
        run: npm stage publish --tag latest

      - name: Stage @seedspec/cli
        working-directory: packages/cli
        run: npm stage publish --tag latest

      - name: Record approval instructions
        run: |
          RELEASE_VERSION=$(node -p "require('./release.json').release_version")
          {
            echo "## SeedSpec ${RELEASE_VERSION} staged for npm review"
            echo
            echo "Distribution tag: \`latest\`"
            echo
            echo "- @seedspec/protocol"
            echo "- @seedspec/runtime"
            echo "- @seedspec/cli"
            echo
            echo "Review and approve all three with 2FA in dependency order: protocol, runtime, then CLI."
          } >> "$GITHUB_STEP_SUMMARY"
